<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Students</h1>
       
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
        {% for student in students_Data %} 
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-3">{{ student.name }}</h2>
                <p class="text-gray-600 mb-2"><span class="font-medium">Email:</span> {{ student.email }}</p>
                <p class="text-gray-600 mb-6"><span class="font-medium">Phone:</span> {{ student.phone }}</p>
                <div class="flex gap-2">
                    <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">View</button>
                    <button class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">Edit</button>
                    <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Delete</button>
                </div>
            </div>
        {% endfor %}
            <!-- Add New Student Card -->
            <div class="bg-white rounded-lg shadow-md p-6 flex items-center justify-center">
                <a href="/student/add-student" class="text-blue-500 hover:text-blue-600 text-lg font-semibold">+ Add New Student</a>
        </div>
    </div>
</body>
</html>
